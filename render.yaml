databases:
  - name: kw-farm-db
    plan: basic-256mb   # ~US$6-7/mo. Use "free" to trial, but it is DELETED after ~30 days.
    databaseName: kwfarm
    user: kwfarm

services:
  - type: web
    name: kw-farm-api
    runtime: node
    rootDir: api-server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kw-farm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        sync: false   # set manually to your frontend's URL once it's deployed, e.g. https://kw-farm-app.onrender.com

  - type: web
    name: kw-farm-app
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        sync: false   # set manually to your API's URL once deployed, e.g. https://kw-farm-api.onrender.com/api
      - key: VITE_GOOGLE_MAPS_KEY
        sync: false   # your Google Maps JavaScript API key
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
